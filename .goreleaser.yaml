version: 2

project_name: spiffecli

builds:
  - id: "spiffecli-build"
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_386
      - windows_amd64
    env:
      - CGO_ENABLED=0

# For documentation see https://goreleaser.com/customization/release/#github
release:
  github:
    owner: defakto-security
    name: spiffecli
  draft: true
  replace_existing_draft: true
  prerelease: auto
  make_latest: true
  mode: append
  name_template: "{{.ProjectName}}-v{{.Version}}"

# Homebrew cask published to the tap repo on each release (macOS only).
# Users install with: brew install defakto-security/tap/spiffecli
# For documentation see https://goreleaser.com/customization/homebrew_casks/
homebrew_casks:
  - name: spiffecli
    repository:
      owner: defakto-security
      name: homebrew-tap
      # PAT with contents:write on the tap repo; the default GITHUB_TOKEN
      # cannot push to a different repository.
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/defakto-security/spiffecli"
    description: "A SPIFFE CLI"
    commit_author:
      name: goreleaser-bot
      email: goreleaser-bot@defakto.security
    # The binary is unsigned; strip the quarantine flag on install so macOS
    # Gatekeeper does not block it on first run.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/spiffecli"]
          end


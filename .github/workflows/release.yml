# .github/workflows/release.yml
name: goreleaser

on:
  push: 
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Mint a short-lived token from the GitHub App installed on the tap repo.
      # The default GITHUB_TOKEN cannot push to a different repository.
      - name: Mint tap token
        id: tap-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.GORELEASER_GHCR_CLIENT_ID }}
          private-key: ${{ secrets.GORELEASER_GHCR_APP_PRIVATE_KEY }}
          owner: defakto-security
          repositories: homebrew-tap
          permission-contents: write

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # App-minted token with contents:write on defakto-security/homebrew-tap
          # so GoReleaser can push the generated cask there.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.tap-token.outputs.token }}

name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

jobs:
  gosec:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run gosec
        uses: securego/gosec@v2.27.1
        with:
          # -no-fail: lint job already enforces gosec rules; this job is for
          # SARIF upload to the GitHub Security tab only.
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true  # requires GHAS; remove once enabled at org level
        with:
          sarif_file: gosec.sarif

  trivy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Build debug image
        run: docker build -f Dockerfile.debug -t spiffecli-debug:ci .

      - name: Scan debug image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'spiffecli-debug:ci'
          format: 'sarif'
          output: 'trivy.sarif'
          exit-code: '0'  # informational — findings appear in Security tab
          ignore-unfixed: true  # drop CVEs with no available fix
          # The nicolaka/netshoot base bundles debug tools (ctop, termshark,
          # grpcurl, fortio, calicoctl) as old prebuilt binaries we don't
          # control. Skip them so the scan reports on our spiffecli binary,
          # not netshoot's. Add new base tools here if they start flooding
          # the Security tab.
          skip-files: 'usr/local/bin/ctop,usr/local/bin/termshark,usr/local/bin/grpcurl,usr/local/bin/fortio,usr/local/bin/calicoctl'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true  # requires GHAS; remove once enabled at org level
        with:
          sarif_file: trivy.sarif
